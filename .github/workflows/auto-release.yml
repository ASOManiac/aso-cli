name: Auto Release

on:
  push:
    branches:
      - main

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version bump
        id: bump
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          # Determine bump type from commit message prefix
          if echo "$COMMIT_MSG" | grep -qiE '^breaking(\(.*\))?[:!]'; then
            BUMP="major"
          elif echo "$COMMIT_MSG" | grep -qiE '^feat(\(.*\))?:'; then
            BUMP="minor"
          elif echo "$COMMIT_MSG" | grep -qiE '^fix(\(.*\))?:'; then
            BUMP="patch"
          else
            echo "No release prefix (fix:/feat:/breaking:) found. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP"

      - name: Calculate next version
        if: steps.bump.outputs.skip != 'true'
        id: version
        run: |
          # Get latest semver tag
          LATEST=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LATEST" ]; then
            LATEST="0.0.0"
            echo "No existing tags found. Starting from 0.0.0"
          else
            echo "Latest tag: $LATEST"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          BUMP="${{ steps.bump.outputs.bump }}"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Create and push tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "Tagged and pushed: $VERSION"
          echo "Release workflow will now trigger automatically."
