name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version || github.ref }}

      - name: Validate release tag
        run: |
          # Use workflow_dispatch input or tag ref
          TAG="${{ inputs.version || github.ref_name }}"

          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must match x.y.z. Got: ${TAG}"
            exit 1
          fi

          printf 'VERSION=%s\n' "$TAG" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Install tooling
        run: make tools

      - name: Run release guardrails
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make format-check
          make check-command-docs
          make lint
          ASC_BYPASS_KEYCHAIN=1 make test

      - name: Create release directory
        run: mkdir -p release

      - name: Check code signing availability
        id: check-signing
        run: |
          if [ -n "$CERT" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "No signing certificate configured. Skipping code signing."
          fi
        env:
          CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}

      - name: Import Apple certificate
        if: steps.check-signing.outputs.available == 'true'
        id: codesign
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}

      - name: Build for macOS
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/aso_${VERSION}_macOS_amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/aso_${VERSION}_macOS_arm64 .

      - name: Code sign macOS binaries
        if: steps.check-signing.outputs.available == 'true'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -n "$IDENTITY" ]; then
            echo "Signing with: $IDENTITY"
            for binary in release/aso_*_macOS_*; do
              codesign --force --sign "$IDENTITY" --timestamp --options=runtime "$binary"
            done
          else
            echo "No signing identity found. Skipping code signing."
          fi

      - name: Build for Linux
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/aso_${VERSION}_linux_amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/aso_${VERSION}_linux_arm64 .

      - name: Build for Windows
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/aso_${VERSION}_windows_amd64.exe .

      - name: Create checksums
        run: |
          cd release
          shasum -a 256 * > aso_${VERSION}_checksums.txt

      - name: Display files
        run: ls -la release/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" release/* --clobber
          else
            gh release create "${VERSION}" release/* --generate-notes --verify-tag
          fi

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          # Skip if no token configured
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN not set, skipping Homebrew tap update"
            exit 0
          fi

          # Compute checksums for all platforms
          SHA_MAC_ARM64=$(shasum -a 256 release/aso_${VERSION}_macOS_arm64 | cut -d ' ' -f 1)
          SHA_MAC_AMD64=$(shasum -a 256 release/aso_${VERSION}_macOS_amd64 | cut -d ' ' -f 1)
          SHA_LINUX_ARM64=$(shasum -a 256 release/aso_${VERSION}_linux_arm64 | cut -d ' ' -f 1)
          SHA_LINUX_AMD64=$(shasum -a 256 release/aso_${VERSION}_linux_amd64 | cut -d ' ' -f 1)

          # Clone the tap repo
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/ASOManiac/homebrew-tap.git homebrew-tap || {
            echo "Homebrew tap update failed (auth/permissions). Skipping."
            exit 0
          }
          cd homebrew-tap

          # Update the formula
          cat > Formula/aso.rb << FORMULA
          # typed: false
          # frozen_string_literal: true

          class Aso < Formula
            desc "ASO CLI - App Store Optimization + App Store Connect"
            homepage "https://github.com/ASOManiac/aso-cli"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ASOManiac/aso-cli/releases/download/${VERSION}/aso_${VERSION}_macOS_arm64"
                sha256 "${SHA_MAC_ARM64}"
              else
                url "https://github.com/ASOManiac/aso-cli/releases/download/${VERSION}/aso_${VERSION}_macOS_amd64"
                sha256 "${SHA_MAC_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/ASOManiac/aso-cli/releases/download/${VERSION}/aso_${VERSION}_linux_arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/ASOManiac/aso-cli/releases/download/${VERSION}/aso_${VERSION}_linux_amd64"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              binary = Dir["aso_*"].first || Dir["aso"].first
              bin.install binary => "aso"
            end

            test do
              assert_match "ASO CLI", shell_output("#{bin}/aso --help")
            end
          end
          FORMULA

          # Commit and push
          git config user.name "ASOManiac"
          git config user.email "noreply@asomaniac.com"
          git add Formula/aso.rb
          git commit -m "Update aso to ${VERSION}" || echo "No changes to commit"
          git push || {
            echo "Homebrew tap push failed (auth/permissions). Skipping."
            exit 0
          }
